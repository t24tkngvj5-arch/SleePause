name: Build unsigned IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Injecter la clé API YouTube (depuis le secret GitHub)
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
        run: |
          printf 'enum Secrets { static let youtubeAPIKey = "%s" }\n' "$YT_API_KEY" > Sources/Secrets.swift

      - name: Installer XcodeGen
        run: brew install xcodegen

      - name: Générer le projet Xcode
        run: xcodegen generate

      - name: Archiver sans signature
        run: |
          xcodebuild archive \
            -project SleepPause.xcodeproj \
            -scheme SleepPause \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/SleepPause.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ONLY_ACTIVE_ARCH=NO

      - name: Empaqueter l'IPA non signé
        run: |
          APP_PATH=$(find build/SleepPause.xcarchive/Products/Applications -name "*.app" -maxdepth 1 | head -n 1)
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build && zip -r SleepPause-unsigned.ipa Payload && rm -rf Payload

      - name: Publier l'IPA en artefact
        uses: actions/upload-artifact@v4
        with:
          name: SleepPause-unsigned-ipa
          path: build/SleepPause-unsigned.ipa
