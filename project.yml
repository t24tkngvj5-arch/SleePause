name: SleepPause

options:
  bundleIdPrefix: com.antoine          # <-- remplace par un préfixe unique à toi
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    VERSIONING_SYSTEM: apple-generic    # requis pour agvtool (incrément du build dans le CI)

targets:
  SleepPause:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.antoine.sleeppause
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon   # <-- doit matcher la fiche App Store Connect
        TARGETED_DEVICE_FAMILY: "1,2"                        # 1 = iPhone, 2 = iPad
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: SleepPause
        NSCameraUsageDescription: "Utilise la caméra TrueDepth pour détecter l'endormissement et mettre la vidéo en pause."
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
# Pas de UIRequiredDeviceCapabilities: arkit volontairement —
# ainsi l'app reste installable sur les appareils sans TrueDepth
# (le lecteur YouTube marche, seule la détection est désactivée).
