<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <style>
    * { margin: 0; padding: 0; }
    html, body { background: #000; height: 100%; overflow: hidden; }
    #player { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="player"></div>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    var player;
    function post(msg) {
      if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.player) {
        window.webkit.messageHandlers.player.postMessage(msg);
      }
    }
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('player', {
        height: '100%',
        width: '100%',
        playerVars: { playsinline: 1, controls: 1, rel: 0, modestbranding: 1 },
        events: {
          onReady:       function()  { post({ event: 'ready' }); },
          onStateChange: function(e) { post({ state: e.data }); },
          onError:       function(e) { post({ error: e.data }); }
        }
      });
    }
  </script>
</body>
</html>
