workflows:
  ios-testflight:
    name: iOS – TestFlight
    instance_type: mac_mini_m2          # une instance plus récente (ex. mac_mini_m4) marche aussi si dispo
    max_build_duration: 60
    integrations:
      app_store_connect: ASC_API_KEY    # <-- nom de l'intégration App Store Connect créée dans l'UI Codemagic
    environment:
      ios_signing:
        distribution_type: app_store     # app_store = requis pour TestFlight
        bundle_identifier: com.antoine.sleeppause   # <-- même bundle id que project.yml
      xcode: latest
      vars:
        APP_STORE_APPLE_ID: 1234567890   # <-- l'"Apple ID" numérique de la fiche app dans App Store Connect
        XCODE_SCHEME: SleepPause
    scripts:
      - name: Générer le projet Xcode (XcodeGen)
        script: |
          brew install xcodegen
          xcodegen generate

      - name: Appliquer les profils de signature
        script: xcode-project use-profiles

      - name: Incrémenter le numéro de build
        script: |
          # 2>/dev/null || echo 0 : gère le tout premier build (aucun build antérieur)
          LATEST=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo 0)
          agvtool new-version -all $(($LATEST + 1))

      - name: Construire l'IPA
        script: |
          xcode-project build-ipa \
            --project "SleepPause.xcodeproj" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Pour TES tests : ajoute-toi comme testeur INTERNE dans App Store Connect.
        # Le build est alors dispo immédiatement sur ton iPhone 13, sans revue bêta.
